output_dir: /home/InductiveWave/experiments

dataset:
  class: InductiveWikiKGComp
  path: /home/InductiveWave/data

task:
  class: InductiveLogicalQuery
  model:
    class: InductWave
    model:
      class: WAVBFnet
      input_dim: 16                 
      hidden_dims: [16, 16]
      message_func: distmult
      aggregate_func: mean
      short_cut: yes
      layer_norm: yes
      dependent: yes
    logic: product
    dropout_ratio: 0.35
  criterion: bce
  sample_weight: no
  adversarial_temperature: 0.12

optimizer:
  class: Adam
  lr: 5.0e-3

engine:
  batch_size: 6                   
  logger: {{ logger }}

train:
  num_epoch: 20                     
  batch_per_epoch: 1000             

metric: mrr
fast_test: 1000                     
skip_eval_on_train: True            
save_embs: False                    
