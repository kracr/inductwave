output_dir: /home/InductiveWave/experiments

dataset:
  class: InductiveFB15k237Comp
  path: /home/InductiveWave/data
  ratio: {{ ratio }}                # specify dataset ratio here or when running the script

task:
  class: InductiveLogicalQuery
  model:
    class: InductWave
    model:
      class: WAVBFnet
      input_dim: 32              
      hidden_dims: [32, 32]
      message_func: distmult
      aggregate_func: pna
      short_cut: yes
      layer_norm: yes
      dependent: yes
    logic: product
    dropout_ratio: 0.35
  criterion: bce
  sample_weight: no
  adversarial_temperature: 0.12

optimizer:
  class: Adam
  lr: 5.0e-3

engine:
  gpus: {{ gpus }}
  batch_size: 32                   
  logger: {{ logger }}

train:
  num_epoch: 30                     
  batch_per_epoch: 1000            

metric: mrr
fast_test: 1000                     
skip_eval_on_train: True            
save_embs: False                    
